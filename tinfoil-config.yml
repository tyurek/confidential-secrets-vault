cvm-version: 0.10.0
memory: 8192
cpus: 4

containers:
  - name: "vault"
    image: "ghcr.io/tyurek/confidential-secrets-vault@sha256:4a513b45b72ad9aedf42f4b6d40c424bf24ad614f3d44a9a6c917dc668381716" # v0.0.3
    restart: always
    networks: ["egress"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s

# The vault verifies each workload's SNP quote + sigstore provenance, so it needs
# egress to fetch the VCEK and the attestation bundle. (The sigstore trust root
# is embedded in the binary, so no TUF egress is required.) Verify this list at
# deploy time — watch the vault log for egress-blocked fetches.
networks:
  egress:
    egress: allowlist
    allow:
      - kdsintf.amd.com               # SEV VCEK + ASK/ARK chain (default getter)
      - kds-proxy.tinfoil.sh          # intended route once the getter is pointed at it
      - api-github-proxy.tinfoil.sh   # GitHub sigstore attestation bundle

shim:
  upstream-port: 8080
  paths: ["/store", "/fetch", "/secrets", "/health"]
